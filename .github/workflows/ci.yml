name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-macos:
    name: Test on macOS
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Swift version
      run: swift --version

    - name: Build
      run: swift build -v

    - name: Run tests
      run: swift test -v

    - name: Build release
      run: swift build -c release

    - name: Test executable
      run: .build/release/yeet --help

  test-linux:
    name: Test on Linux
    runs-on: ubuntu-latest
    container:
      image: swift:5.10

    steps:
    - uses: actions/checkout@v4

    - name: Swift version
      run: swift --version

    - name: Install system dependencies
      run: apt-get update && apt-get install -y libicu-dev

    - name: Build
      run: swift build -v

    - name: Run tests
      run: swift test -v

    - name: Build release
      run: swift build -c release

    - name: Test executable
      run: .build/release/yeet --help

  lint:
    name: SwiftLint
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: SwiftLint
      run: |
        # Install swiftlint if needed
        if ! command -v swiftlint &> /dev/null; then
          brew install swiftlint
        fi
        swiftlint --version || echo "SwiftLint not configured, skipping"
